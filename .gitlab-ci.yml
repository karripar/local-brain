image: docker:24.0.5

stages:
  - build
  - deploy

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

before_script:
  # Login to GitLab container registry
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build-client:
  stage: build
  tags:
    - docker
  script:
    - |
      docker build \
        --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN \
        -t $CI_REGISTRY_IMAGE/milvus-client:$CI_COMMIT_SHORT_SHA \
        .
    - docker push $CI_REGISTRY_IMAGE/milvus-client:$CI_COMMIT_SHORT_SHA

deploy-client:
  stage: deploy
  tags:
    - go-exchange-runner
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $CI_REGISTRY_IMAGE/milvus-client:$CI_COMMIT_SHORT_SHA

    # Stop and remove previous container
    - docker stop milvus-client || true
    - docker rm milvus-client || true

    # Run the new container
    - |
      docker run -d \
        --restart unless-stopped \
        --network milvus \
        -p 3006:3006 \
        --name milvus-client \
        -e PORT=3006 \
        -e OPENAI_API_KEY=$OPENAI_API_KEY \
        -e MILVUS_ADDRESS=milvus-standalone:19530 \
        -e EMBEDDING_MODEL=text-embedding-3-small \
        -e VECTOR_DIMENSIONS=1536 \
        -e COLLECTION_NAME=rag_documents \
        -e SOURCE_SECRET=$SOURCE_SECRET \
        $CI_REGISTRY_IMAGE/milvus-client:$CI_COMMIT_SHORT_SHA
