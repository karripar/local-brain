image: docker:24.0.5

stages:
  - build
  - deploy

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_TLS_CERTDIR: ''
  DOCKER_BUILDKIT: '1'

before_script:
  # Login to GitLab registry
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build-milvus:
  stage: build
  tags:
    - docker
  script:
    - |
      docker build \
        --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN \
        -t $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA \
        .
    - docker push $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA

deploy-milvus:
  stage: deploy
  tags:
    - go-exchange-runner
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA

    # Stop/remove old containers
    - docker stop milvus-client milvus-standalone || true
    - docker rm milvus-client milvus-standalone || true

    # Create network if not exists
    - docker network ls | grep go-exchange || docker network create go-exchange

    # Run Milvus server
    - docker run -d \
        --restart unless-stopped \
        --network go-exchange \
        -p 19530:19530 \
        -p 19121:19121 \
        --name milvus-standalone \
        milvusdb/milvus:v2.2.8

    # Get Milvus server IP
    - export MILVUS_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' milvus-standalone)

    # Run Milvus client pointing directly to the server IP
    - |
     docker run -d \
        --restart unless-stopped \
        --network go-exchange \
        -p 3006:3006 \
        -e PORT=3006 \
        -e OPENAI_API_KEY=$OPENAI_API_KEY \
        -e MILVUS_ADDRESS=$MILVUS_IP:19530 \
        -e EMBEDDING_MODEL=text-embedding-3-small \
        -e VECTOR_DIMENSIONS=1536 \
        -e COLLECTION_NAME=rag_documents \
        -e SOURCE_SECRET=$SOURCE_SECRET \
        --name milvus-client \
        $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA \
        npm start
