image: docker:24.0.5

stages:
  - build
  - deploy

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_TLS_CERTDIR: ''
  DOCKER_BUILDKIT: '1'

before_script:
  # Login to GitLab registry
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build-milvus:
  stage: build
  tags:
    - docker
  script:
    - |
      docker build \
        --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN \
        -t $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA \
        .
    - docker push $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA

deploy-milvus:
  stage: deploy
  tags:
    - go-exchange-runner
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

    # Stop and remove any old containers first
    - docker stop milvus-client milvus-standalone || true
    - docker rm milvus-client milvus-standalone || true

    # Remove old network if exists
    - docker network rm go-exchange || true

    # Create network explicitly
    - docker network create go-exchange || true

    # Deploy Milvus server
    - docker run -d --name milvus-standalone --network go-exchange -p 19530:19530 -p 19121:19121 milvusdb/milvus:v2.2.8

    # Deploy Milvus client
    - docker run -d \
      --name milvus-client \
      --network go-exchange \
      -p 3006:3006 \
      -e PORT=3006 \
      -e OPENAI_API_KEY=$OPENAI_API_KEY \
      -e MILVUS_ADDRESS=milvus-standalone:19530 \
      -e EMBEDDING_MODEL=text-embedding-3-small \
      -e VECTOR_DIMENSIONS=1536 \
      -e COLLECTION_NAME=rag_documents \
      -e SOURCE_SECRET=$SOURCE_SECRET \
      $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA \
      sh -c "./wait-for-milvus.sh milvus-standalone 19530 npm start"
