image: docker:24.0.5

stages:
  - build
  - deploy

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_TLS_CERTDIR: ''
  DOCKER_BUILDKIT: '1'

before_script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build-milvus:
  stage: build
  tags:
    - docker
  script:
    - docker build --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN -t $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA
    
deploy-milvus:
  stage: deploy
  tags:
    - go-exchange-runner
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA

    # Replace the Milvus image in docker-compose.yml
    - >
      sed -i "s|image: milvusdb/milvus:v2.2.8|image: ${CI_REGISTRY_IMAGE}/milvus:${CI_COMMIT_SHORT_SHA}|g"
      docker-compose.yml

    # Deploy with docker-compose
    - docker-compose -f docker-compose.yml up -d
