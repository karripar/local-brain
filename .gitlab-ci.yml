image: docker:24.0.5

stages:
  - build
  - deploy

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

before_script:
  # Login to GitLab registry d
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build-milvus:
  stage: build
  tags:
    - docker
  script:
    - |
      docker build \
        --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN \
        -t $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA \
        .
    - docker push $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA

deploy-milvus:
  stage: deploy
  tags:
    - go-exchange-runner
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

    # Write Docker Compose file dynamically
    - |
      cat > docker-compose.yml <<EOF
      version: "3.9"

      services:
        milvus-standalone:
          image: milvusdb/milvus:v2.2.8
          container_name: milvus-standalone
          ports:
            - "19530:19530"
            - "19121:19121"
          networks:
            - go-exchange

        milvus-client:
          image: $CI_REGISTRY_IMAGE/milvus:$CI_COMMIT_SHORT_SHA
          container_name: milvus-client
          environment:
            PORT: 3006
            OPENAI_API_KEY: ${OPENAI_API_KEY}
            MILVUS_ADDRESS: milvus-standalone:19530
            EMBEDDING_MODEL: text-embedding-3-small
            VECTOR_DIMENSIONS: 1536
            COLLECTION_NAME: rag_documents
            SOURCE_SECRET: ${SOURCE_SECRET}
          ports:
            - "3006:3006"
          depends_on:
            - milvus-standalone
          networks:
            - go-exchange

      networks:
        go-exchange:
          driver: bridge
      EOF

    # Stop any existing stack
    - docker-compose -f docker-compose.yml down || true

    # Deploy the stack
    - docker-compose -f docker-compose.yml up -d
